name: release

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - name: Checkout all commits
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup/action.yml
        with:
          ref: ${{ github.head.ref }}
          node-version: ${{ matrix.node-version }}
      - uses: ./.github/actions/build/action.yml
      - uses: ./.github/actions/publish-npm/action.yml
