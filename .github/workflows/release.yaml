name: release

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - uses: ./.github/actions/setup.yaml
        with:
          ref: ${{ github.head.ref }}
          node-version: ${{ matrix.node-version }}
      - uses: ./.github/actions/build.yaml
      - uses: ./.github/actions/publish-npm.yaml
