name: PR

on:
  pull_request:
    branches: ['main']
    types: [opened, reopened, synchronize]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - name: Checkout all commits
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: ../actions/setup/action.yml
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          node-version: ${{ matrix.node-version }}
      - uses: ../actions/build/action.yml
