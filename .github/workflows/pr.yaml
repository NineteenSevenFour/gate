name: PR

on:
  pull_request:
    branches: ['main']
    types: [opened, reopened, synchronize]

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - uses: ./.github/actions/setup/action.yaml
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          node-version: ${{ matrix.node-version }}
      - uses: ./.github/actions/build/action.yaml
